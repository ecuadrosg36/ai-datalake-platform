AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AI-Powered Data Lake Platform — AWS Infrastructure
  Creates S3 Data Lake, Glue Catalog, Athena Workgroup, Lambda Functions,
  and supporting resources for the Medallion Architecture pipeline.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: ai-datalake-platform
    Description: Project name used for resource naming

  AlertEmail:
    Type: String
    Default: admin@example.com
    Description: Email for SNS alerts

Resources:
  # ==========================================================================
  # S3 Data Lake Bucket
  # ==========================================================================
  DataLakeBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          # Raw data: move to IA after 30 days, Glacier after 180
          - Id: RawDataLifecycle
            Prefix: raw/
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
              - StorageClass: GLACIER
                TransitionInDays: 180
          # Processed data: move to IA after 90 days
          - Id: ProcessedDataLifecycle
            Prefix: processed/
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
          # Rejected data: expire after 90 days
          - Id: RejectedDataLifecycle
            Prefix: rejected/
            Status: Enabled
            ExpirationInDays: 90
          # Temp files: expire after 7 days
          - Id: TempDataLifecycle
            Prefix: tmp/
            Status: Enabled
            ExpirationInDays: 7
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ==========================================================================
  # Glue Data Catalog
  # ==========================================================================
  GlueDatabaseRaw:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: !Sub '${ProjectName}_raw_${Environment}'
        Description: 'Bronze Layer — Raw ingested data'

  GlueDatabaseProcessed:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: !Sub '${ProjectName}_processed_${Environment}'
        Description: 'Silver Layer — Cleaned and validated data'

  GlueDatabaseCurated:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: !Sub '${ProjectName}_curated_${Environment}'
        Description: 'Gold Layer — Aggregated business metrics'

  # Glue Crawler for Bronze Layer
  GlueCrawlerBronze:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub '${ProjectName}-bronze-crawler-${Environment}'
      Role: !GetAtt GlueRole.Arn
      DatabaseName: !Ref GlueDatabaseRaw
      Targets:
        S3Targets:
          - Path: !Sub 's3://${DataLakeBucket}/raw/'
      Schedule:
        ScheduleExpression: 'cron(0 */2 * * ? *)'
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG
      Configuration: >
        {
          "Version": 1.0,
          "Grouping": { "TableGroupingPolicy": "CombineCompatibleSchemas" }
        }

  # Glue Crawler for Silver Layer
  GlueCrawlerSilver:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub '${ProjectName}-silver-crawler-${Environment}'
      Role: !GetAtt GlueRole.Arn
      DatabaseName: !Ref GlueDatabaseProcessed
      Targets:
        S3Targets:
          - Path: !Sub 's3://${DataLakeBucket}/processed/'
      Schedule:
        ScheduleExpression: 'cron(0 */1 * * ? *)'

  # ==========================================================================
  # Athena Workgroup
  # ==========================================================================
  AthenaWorkgroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub '${ProjectName}-workgroup-${Environment}'
      State: ENABLED
      WorkGroupConfiguration:
        ResultConfiguration:
          OutputLocation: !Sub 's3://${DataLakeBucket}/athena-results/'
          EncryptionConfiguration:
            EncryptionOption: SSE_S3
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: true
        BytesScannedCutoffPerQuery: 10737418240  # 10 GB limit

  # ==========================================================================
  # Lambda Function — Pipeline Trigger
  # ==========================================================================
  PipelineTriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-trigger-${Environment}'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      MemorySize: 512
      Architectures:
        - arm64  # Cost optimization
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          S3_BUCKET: !Ref DataLakeBucket
          GLUE_DATABASE: !Ref GlueDatabaseProcessed
      Code:
        ZipFile: |
          import json
          import boto3
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              """Trigger pipeline processing for new data in S3."""
              logger.info(f"Event received: {json.dumps(event)}")

              for record in event.get('Records', []):
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  logger.info(f"Processing: s3://{bucket}/{key}")

                  # Determine layer based on S3 prefix
                  if key.startswith('raw/'):
                      logger.info("New Bronze data detected — triggering Silver transform")
                      # In production: trigger Glue job or Step Functions
                  elif key.startswith('processed/'):
                      logger.info("New Silver data detected — triggering Gold aggregation")

              return {'statusCode': 200, 'body': 'Pipeline triggered'}
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ==========================================================================
  # SNS Alert Topic
  # ==========================================================================
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-alerts-${Environment}'
      DisplayName: 'AI Data Lake Alerts'

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ==========================================================================
  # CloudWatch Dashboard
  # ==========================================================================
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${ProjectName}-${Environment}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "title": "Lambda Invocations",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${PipelineTriggerFunction}"]
                ],
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "properties": {
                "title": "Lambda Errors",
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "${PipelineTriggerFunction}"]
                ],
                "period": 300,
                "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "properties": {
                "title": "S3 Bucket Size",
                "metrics": [
                  ["AWS/S3", "BucketSizeBytes", "BucketName", "${DataLakeBucket}", "StorageType", "StandardStorage"]
                ],
                "period": 86400,
                "stat": "Average"
              }
            }
          ]
        }

  # ==========================================================================
  # IAM Roles
  # ==========================================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DataLakeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataLakeBucket.Arn
                  - !Sub '${DataLakeBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - glue:StartJobRun
                  - glue:GetJobRun
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertTopic

  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-glue-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataLakeBucket.Arn
                  - !Sub '${DataLakeBucket.Arn}/*'

Outputs:
  DataLakeBucketName:
    Description: S3 Data Lake bucket name
    Value: !Ref DataLakeBucket
    Export:
      Name: !Sub '${ProjectName}-bucket-${Environment}'

  AthenaWorkgroupName:
    Description: Athena workgroup name
    Value: !Ref AthenaWorkgroup

  RawDatabase:
    Description: Glue database for Bronze layer
    Value: !Ref GlueDatabaseRaw

  ProcessedDatabase:
    Description: Glue database for Silver layer
    Value: !Ref GlueDatabaseProcessed

  CuratedDatabase:
    Description: Glue database for Gold layer
    Value: !Ref GlueDatabaseCurated

  AlertTopicArn:
    Description: SNS topic ARN for alerts
    Value: !Ref AlertTopic
